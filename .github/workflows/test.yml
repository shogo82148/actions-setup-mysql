name: "test"
on:
  pull_request:
  push:
    branches:
      - main
      - "releases/*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".node-version"
          cache: npm

      - run: npm ci
      - run: npm run test
        env:
          GITHUB_TOKEN: ${{ github.token }}

  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-26.04
          - ubuntu-24.04
          - ubuntu-22.04
          - ubuntu-26.04-arm
          - ubuntu-24.04-arm
          - ubuntu-22.04-arm
          - macos-26
          - macos-15
          - macos-15-intel
          - macos-14
          - windows-2025
          - windows-2022
        mysql:
          - "9.7" # latest/LTS
          - "8.4" # LTS
          - "8.0"
          - "mariadb-12.3" # latest
          - "mariadb-11.8" # LTS
          - "mariadb-11.4" # LTS
          - "mariadb-10.11" # LTS
        exclude:
          # TODO(#1458): mariadb-12.3 crashes with signal 11 on macos-15-intel.
          # Re-enable once upstream/root cause is fixed.
          - os: macos-15-intel
            mysql: "mariadb-12.3"
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".node-version"
          cache: npm
      - name: Set up perl
        uses: shogo82148/actions-setup-perl@a198315ec4e9244f206879ea7b63078003aec8a6 # v1.41.1
        with:
          perl-version: "5.40"

      - run: npm ci
      - run: npm run bundle
      - name: use the action
        id: action
        uses: ./
        with:
          mysql-version: ${{ matrix.mysql }}
          root-password: very-very-secret
          user: my
          password: secret
      - name: test
        run: |
          prove -v t
        env:
          MYSQL_VERSION: ${{ matrix.mysql }}
          BASE_DIR: ${{ steps.action.outputs.base-dir }}

  # https://github.com/shogo82148/actions-setup-mysql/issues/421
  test-issue421:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".node-version"
          cache: npm

      - run: npm ci
      - run: npm run bundle
      - name: use the action
        id: action
        uses: ./
        with:
          mysql-version: "8.3"
          root-password: very-very-secret
          user: my
          password: secret
          my-cnf: |
            port=5729
            authentication_policy=mysql_native_password
            sql_mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
